name: Contracts

on:
  push:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'

jobs:
  test:
    name: Hardhat tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run coverage
        continue-on-error: true

  slither:
    name: Slither
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crytic/slither-action@v0.4.0
        with:
          target: 'contracts'
          fail-on: high
          # Ignore informational / low noise while still failing on high/critical findings.
          slither-args: '--filter-paths "node_modules|openzeppelin|@openzeppelin"'
